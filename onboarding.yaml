company:
  name: "GOkasha Ecommerce Accountant Software"
  mission: "Build a source-of-truth ecommerce accounting and operations system for a perfume business in Egypt."
  vision: "Manage products, inventory, Shopify sales, offline sales, customer receivables, supplier payables, money accounts, partner capital, and profitability from one controlled system."
  website: ""

  values:
    - "Accuracy before speed"
    - "Simple practical workflows"
    - "Source of truth over scattered files"
    - "Test financial and inventory logic before merge"
    - "Protect secrets and business data"

  products:
    - name: "Ecommerce Accountant Software"
      description: "Internal ERP-style system for perfume ecommerce operations, inventory, Shopify sync, sales, payments, accounting, and reports."
      type: "web-app"

team:
  - name: "Gamal"
    role: "head-of-product"
    department: "product"

  - name: "Claude Code"
    role: "tech-lead"
    department: "engineering"

  - name: "AI Code Reviewer"
    role: "qa-engineer"
    department: "engineering"

tech_stack:
  language: "TypeScript"
  runtime: "Node.js"
  framework: "Next.js"
  backend: "Next.js API routes and server-side services"
  database: "PostgreSQL"
  hosting: "Local development now; production hosting decision later"
  ci_cd: "GitHub Actions later"
  testing: "Vitest"
  e2e_testing: "Not enabled yet"
  orm: "Prisma"
  styling: "Tailwind CSS"
  api_style: "REST"

project_management:
  tool: "GitHub Issues"
  sprint_duration: "Phase-based"
  branching_strategy: "feature-branch"
  ticket_prefix: "GH"

quality:
  test_coverage_target: 80
  required_reviews: 1
  required_checks:
    - lint
    - typecheck
    - test
  review_style: "thorough"

workflows:
  require_prd: true
  require_technical_design: true
  require_qa_signoff: true
  require_security_review: true
  use_feature_flags: false
  use_agent_decision_records: true

communication:
  primary: "ChatGPT, Claude Code, VS Code, and GitHub PRs"
  documentation: "Markdown docs inside the repo"
  design: "Code-first; Figma only when needed"
